<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew Verb Logic Engine - Advanced</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { font-size: 2.2em; padding: 10px; width: 250px; text-align: center; border: 3px solid #007bff; border-radius: 12px; margin-bottom: 20px; outline: none; }
        .node-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .card { background: #fff; border: 1px solid #dee2e6; padding: 12px 18px; border-radius: 10px; font-weight: 600; min-width: 140px; display: flex; flex-direction: column; }
        .interactive-card { cursor: pointer; transition: 0.2s; }
        .interactive-card:hover { border-color: #007bff; background: #f0f7ff; }
        .selected { background: #007bff !important; color: white !important; border-color: #0056b3; }
        .selected span { color: #e0e0e0; }
        
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .result-card { background: #fafafa; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .result-pronoun { font-size: 0.9em; color: #718096; margin-bottom: 5px; font-weight: normal; }
        .result-verb { font-size: 2.2em; color: #1a202c; font-weight: bold; line-height: 1.2; font-family: 'Segoe UI', sans-serif; }
        
        .hidden { display: none; }
        .step-label { color: #8e8e8e; font-size: 0.75em; text-transform: uppercase; font-weight: 800; width: 100%; margin-top: 20px; letter-spacing: 1.5px; }
        #path-display { display: flex; justify-content: center; gap: 20px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hebrew Logic Engine</h1>
    <input type="text" id="shoresh" placeholder="כנס / תרגם" maxlength="4" oninput="update()">

    <div id="layer1" class="node-container">
        <p class="step-label">1. Group / קבוצה</p>
        <div class="card interactive-card" onclick="selectGroup('simple')">Simple<span>פעל/נפעל</span></div>
        <div class="card interactive-card" onclick="selectGroup('intensive')">Intensive<span>פיעל/פועל</span></div>
        <div class="card interactive-card" onclick="selectGroup('causative')">Causative<span>הפעיל/הופעל</span></div>
        <div class="card interactive-card" onclick="selectGroup('reflexive')">Reflexive<span>התפעל</span></div>
    </div>

    <div id="layer2" class="node-container hidden">
        <p class="step-label">2. Binyan / בניין</p>
        <div id="binyan-options" class="node-container"></div>
    </div>

    <div id="layer3" class="node-container hidden">
        <p class="step-label">3. Tense / זמן</p>
        <div class="card interactive-card" onclick="select(3, 'past')">Past<span>עבר</span></div>
        <div class="card interactive-card" onclick="select(3, 'pres')">Present<span>הווה</span></div>
        <div class="card interactive-card" onclick="select(3, 'fut')">Future<span>עתיד</span></div>
        <div class="card interactive-card" onclick="select(3, 'imp')">Imperative<span>ציווי</span></div>
        <div class="card interactive-card" onclick="select(3, 'inf')">Infinitive<span>שם הפועל</span></div>
        <div class="card interactive-card" onclick="select(3, 'ger')">Gerund<span>שם הפעולה</span></div>
    </div>

    <div id="layer4" class="node-container hidden">
        <p class="step-label">4. Conjugations / נטיות</p>
        <div id="results-display" class="results-grid"></div>
        <div id="path-display">
            <div id="path-en" style="color: #007bff; font-weight: bold;"></div>
            <div id="path-he" style="color: #28a745; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    let path = { group: '', binyan: '', tense: '' };

    const binyanData = {
        simple: [{ id: 'paal', en: 'Pa\'al', he: 'פָּעַל' }, { id: 'nifal', en: 'Nif\'al', he: 'נִפְעַל' }],
        intensive: [{ id: 'piel', en: 'Pi\'el', he: 'פִּיעֵל' }, { id: 'pual', en: 'Pu\'al', he: 'פֻּעַל' }],
        causative: [{ id: 'hifil', en: 'Hif\'il', he: 'הִפְעִיל' }, { id: 'hufal', en: 'Huf\'al', he: 'הֻפְעַל' }],
        reflexive: [{ id: 'hitpael', en: 'Hitpa\'el', he: 'הִתְפַּעֵל' }]
    };

    const persons = [
        { id: '1s', en: 'I', he: 'אני', past: 'תִּי', fut_pre: 'אֶ' },
        { id: '2ms', en: 'You m.', he: 'אתה', past: 'תָּ', fut_pre: 'תִּ' },
        { id: '2fs', en: 'You f.', he: 'את', past: 'תְּ', fut_pre: 'תִּ', fut_suf: 'ִי' },
        { id: '3ms', en: 'He', he: 'הוא', past: '', fut_pre: 'יִ' },
        { id: '3fs', en: 'She', he: 'היא', past: 'ָה', fut_pre: 'תִּ' },
        { id: '1p', en: 'We', he: 'אנחנו', past: 'ְנוּ', fut_pre: 'נִ' },
        { id: '2mp', en: 'You all m.', he: 'אתם', past: 'ְתֶּם', fut_pre: 'תִּ', fut_suf: 'וּ' },
        { id: '2fp', en: 'You all f.', he: 'אתן', past: 'ְתֶּן', fut_pre: 'תִּ', fut_suf: 'נָה' },
        { id: '3p', en: 'They', he: 'הם/הן', past: 'וּ', fut_pre: 'יִ', fut_suf: 'וּ' }
    ];

    function selectGroup(g) {
        path.group = g;
        path.binyan = '';
        const container = document.getElementById('binyan-options');
        container.innerHTML = '';
        binyanData[g].forEach(b => {
            const div = document.createElement('div');
            div.className = 'card interactive-card';
            div.innerHTML = `${b.en}<span>${b.he}</span>`;
            div.onclick = (e) => { 
                path.binyan = b.id; 
                show('layer3'); 
                highlight(2, div); 
                update(); 
            };
            container.appendChild(div);
        });
        show('layer2'); 
        highlight(1);
        document.getElementById('layer3').classList.add('hidden');
        document.getElementById('layer4').classList.add('hidden');
    }

    function select(layer, key) {
        if (layer === 3) { 
            path.tense = key; 
            show('layer4'); 
            highlight(3); 
        }
        update();
    }

    function highlight(layer, target) {
        const el = target || event.currentTarget;
        document.querySelectorAll(`#layer${layer} .card`).forEach(c => c.classList.remove('selected'));
        if(el) el.classList.add('selected');
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }

    function unSofit(char) {
        const reverseMap = { 'ך': 'כ', 'ם': 'מ', 'ן': 'נ', 'ף': 'פ', 'ץ': 'צ' };
        return reverseMap[char] || char;
    }

    function applyDagesh(char) {
        if (char === 'ש') return 'שׁ';
        return ['ב', 'ג', 'ד', 'כ', 'פ', 'ת'].includes(char) ? char + "ּ" : char;
    }

    // Helper to determine if a character is guttural and rejects a dagesh chazak
    function isGuttural(char) {
        return ['א', 'ה', 'ח', 'ע', 'ר'].includes(char);
    }

    function applySofit(word) {
        const sofitMap = { 'כ': 'ך', 'מ': 'ם', 'נ': 'ן', 'פ': 'ף', 'צ': 'ץ' };
        let letters = word.split('');
        for (let i = letters.length - 1; i >= 0; i--) {
            if (letters[i] >= '\u05D0' && letters[i] <= '\u05EA') {
                if (sofitMap[letters[i]]) {
                    letters[i] = sofitMap[letters[i]];
                }
                break;
            }
        }
        return letters.join('');
    }

    // Helper: detect a three-letter root that starts with yod
    function isYodRootShoresh(cleanShoresh) {
        return typeof cleanShoresh === 'string' && cleanShoresh.length === 3 && cleanShoresh[0] === 'י';
    }

    // List of stative verbs that use פָּעֵל pattern in present tense instead of the regular פּוֹעֵל
    function isStativeVerb(cleanShoresh) {
        const stativeRoots = ['ירא', 'זקנ', 'חפצ', 'גדל', 'כבד'];
        return stativeRoots.includes(cleanShoresh);
    }

    // Hif'il special handling for initial-yod roots (e.g., ידע)
    function hifilYodForm(tense, targetPersonId, r1, r2, r3, item, suf) {
        // base for yod-roots uses r2/r3 and inserts the vowel pattern _í_ (ִי)
        if (tense === 'past') {
            // 3rd-person keep the hireq pattern and often take a patach (ending) when no suf
            if (['3ms', '3fs', '3p'].includes(targetPersonId)) {
                return 'הוֹ' + r2 + 'ִי' + r3 + (suf || 'ַ');
            }
            // non-3rd-person past forms: הוֹ + r2 + patach + r3 + sheva + suf (e.g., הוֹדַעְתִּי)
            return 'הוֹ' + r2 + 'ַ' + r3 + 'ְ' + (suf || '');
        }

        if (tense === 'pres') {
            // present: מוֹ + r2 + 'ִי' + r3 ; feminine singular often gets patach+heh
            if (targetPersonId === 'fs') return 'מוֹ' + r2 + 'ִי' + r3 + 'ַ' + 'ה';
            return 'מוֹ' + r2 + 'ִי' + r3 + (suf || '');
        }

        if (tense === 'fut') {
            let base = r2 + 'ִי' + r3;
            let pre = (item && item.fut_pre) ? item.fut_pre[0] + 'וֹ' : '';
            let extra = (!suf && targetPersonId === '3ms') ? 'ַ' : '';
            return pre + base + (suf || '') + extra;
        }

        return null;
    }

    function isHollowRoot(r2) {
        return ['ו', 'י'].includes(r2);
    }

    function isHeRoot(r3) {
        return r3 === 'ה';
    }

    function isAyinOrChetRoot(r3) {
        return ['ע', 'ח'].includes(r3);
    }

    function paalPresentForm(targetPersonId, r1, r2, r3, suf, isStative) {
        const base = applyDagesh(r1);

        // Stative verb pattern: פָּעֵל (paʿel) instead of פּוֹעֵל (poʿel)
        if (isStative) {
            if (targetPersonId === 'ms') return base + 'ָ' + r2 + 'ֵ' + r3;
            if (targetPersonId === 'fs') return base + 'ְ' + r2 + 'ֵ' + r3 + 'ָה';
            if (targetPersonId === 'mp') return base + 'ְ' + r2 + 'ֵ' + r3 + 'ִים';
            if (targetPersonId === 'fp') return base + 'ְ' + r2 + 'ֵ' + r3 + 'וֹת';
        }

        if (isHollowRoot(r2)) {
            if (targetPersonId === 'ms') return base + 'ָ' + r3;
            if (targetPersonId === 'fs') {
                if (r3 === 'א') return base + 'ָ' + r3 + 'ָ' + 'ה';
                return base + 'ָ' + r3 + 'ָ' + (suf || 'ת');
            }
            if (targetPersonId === 'mp') return base + 'ָ' + r3 + 'ִים';
            if (targetPersonId === 'fp') return base + 'ָ' + r3 + 'וֹת';
        }

        if (isHeRoot(r3)) {
            if (targetPersonId === 'ms') return base + 'וֹ' + r2 + 'ֶ' + r3;
            if (targetPersonId === 'fs') return base + 'וֹ' + r2 + 'ָ' + r3;
            if (targetPersonId === 'mp') return base + 'וֹ' + r2 + 'ִים';
            if (targetPersonId === 'fp') return base + 'וֹ' + r2 + 'וֹת';
        }

        if (isAyinOrChetRoot(r3)) {
            if (targetPersonId === 'ms') return base + 'וֹ' + r2 + 'ֵ' + r3 + 'ַ';
            if (targetPersonId === 'fs') return base + 'וֹ' + r2 + 'ַ' + r3 + 'ַ' + (suf || 'ת');
            if (targetPersonId === 'mp') return base + 'וֹ' + r2 + 'ְ' + r3 + 'ִים';
            if (targetPersonId === 'fp') return base + 'וֹ' + r2 + 'ְ' + r3 + 'וֹת';
        }

        if (targetPersonId === 'fs') {
            if (r3 === 'א') return base + 'וֹ' + r2 + 'ֵ' + r3 + (suf || 'ת');
            return base + 'וֹ' + r2 + 'ֶ' + r3 + 'ֶ' + (suf || 'ת');
        }
        if (targetPersonId === 'mp') return base + 'וֹ' + r2 + 'ְ' + r3 + 'ִים';
        if (targetPersonId === 'fp') return base + 'וֹ' + r2 + 'ְ' + r3 + 'וֹת';
        return base + 'וֹ' + r2 + 'ֵ' + r3;
    }

    // Pa'al past tense form with weak-root handling
    function paalPastForm(targetPersonId, r1, r2, r3, suf, isStative) {
        // Helper to determine if we need to add sheva separator before suffix
        const needsShevaSeparator = (suf) => {
            if (!suf) return false;
            const firstChar = suf[0];
            // Add sheva if suffix doesn't start with a vowel or sheva
            const vowels = ['ַ', 'ָ', 'ִ', 'ֱ', 'ְ', 'ֲ', 'ֶ', 'ֹ', 'ֻ', 'ּ', 'ְ'];
            return !vowels.includes(firstChar);
        };

        // Helper to apply qamatz and dagesh on first letter (for most roots)
        const getR1WithQamatzDagesh = () => r1 + 'ָ' + 'ּ';
        
        // Helper to apply sheva and dagesh on first letter (for certain plural forms)
        const getR1WithShevaDagesh = () => r1 + 'ְ' + 'ּ';

        // Hollow roots (ו or י in middle)
        if (isHollowRoot(r2)) {
            const r1Char = r1; // No dagesh for hollow roots
            if (targetPersonId === '3ms') return r1Char + 'ָ' + r3;
            if (targetPersonId === '3fs') return r1Char + 'ָ' + r3 + 'ָה';
            if (targetPersonId === '3p') return r1Char + 'ָ' + r3 + 'וּ';
            // 1st & 2nd person: patach on r1, patach on r3, then suffix
            const sep = needsShevaSeparator(suf) ? 'ְ' : '';
            if (targetPersonId === '2mp') {
                // 2mp gets special vowel pattern: sheva on r1, patach on r3
                return r1Char + 'ְ' + r3 + 'ַ' + suf;
            }
            return r1Char + 'ַ' + r3 + sep + suf;
        }

        // Stative verbs - use standard past pattern like regular verbs
        if (isStative) {
            if (targetPersonId === '3ms') return getR1WithQamatzDagesh() + r2 + 'ַ' + r3;
            if (targetPersonId === '3fs') return getR1WithQamatzDagesh() + r2 + 'ְ' + r3 + 'ָה';
            if (targetPersonId === '3p') return getR1WithQamatzDagesh() + r2 + 'ְ' + r3 + 'וּ';
            // 1st & 2nd person
            const sep = needsShevaSeparator(suf) ? 'ְ' : '';
            return getR1WithQamatzDagesh() + r2 + 'ַ' + r3 + sep + suf;
        }

        // Final-he roots (ה in position 3) - NO dagesh on r1!
        if (isHeRoot(r3)) {
            const r1Char = r1; // No dagesh for final-he roots
            if (targetPersonId === '3ms') return r1Char + 'ָ' + r2 + 'ָה';
            if (targetPersonId === '3fs') return r1Char + 'ָ' + r2 + 'ְתָה';
            if (targetPersonId === '3p') return r1Char + 'ָ' + r2 + 'וּ';
            // 1st & 2nd person: qamatz on r1, hireq on r2, yud-hiriq before suffix
            if (targetPersonId === '1s') {
                return r1Char + 'ָ' + r2 + 'ִי' + suf;
            }
            if (targetPersonId === '2ms') {
                return r1Char + 'ָ' + r2 + 'ִי' + suf;
            }
            if (targetPersonId === '2fs') {
                // 2fs suffix is תְּ but expected shows קָנִית - need to check
                return r1Char + 'ָ' + r2 + 'ִי' + suf;
            }
            if (targetPersonId === '1p') return r1Char + 'ָ' + r2 + 'ִי' + 'ְנוּ';
            if (targetPersonId === '2mp') return r1Char + 'ָ' + r2 + 'ִי' + 'ְתֶּם';
            if (targetPersonId === '2fp') return r1Char + 'ָ' + r2 + 'ִי' + 'ְתֶּן';
        }

        // Final-nun/tav with dagesh merge (like נתן -> נתתי) - NO dagesh on r1!
        if ((r3 === 'נ' || r3 === 'ת') && ['1s', '2ms', '2fs', '1p', '2mp', '2fp'].includes(targetPersonId)) {
            const r1Char = r1; // No dagesh for final-nun/tav
            // Merge r3 with the first letter of the suffix by adding dagesh to that letter
            if (targetPersonId === '1s') {
                // Suffix is תִּי; first letter ת gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'תּ' + suf.substring(1); // Remove original ת, add תּ
            }
            if (targetPersonId === '2ms') {
                // Suffix is תָּ; first letter ת gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'תּ' + suf.substring(1);
            }
            if (targetPersonId === '2fs') {
                // Suffix is תְּ; first letter ת gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'תּ' + suf.substring(1);
            }
            if (targetPersonId === '1p') {
                // Suffix is ְנוּ; first letter נ gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'נּ' + suf.substring(1);
            }
            if (targetPersonId === '2mp') {
                // Suffix is ְתֶּם; first letter ת (after sheva) gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'תּ' + suf.substring(1);
            }
            if (targetPersonId === '2fp') {
                // Suffix is ְתֶּן; first letter ת (after sheva) gets dagesh
                return r1Char + 'ָ' + r2 + 'ַ' + 'תּ' + suf.substring(1);
            }
        }

        // Standard/regular verb pattern
        if (targetPersonId === '3ms') return getR1WithQamatzDagesh() + r2 + 'ַ' + r3;
        if (targetPersonId === '3fs') return getR1WithQamatzDagesh() + r2 + 'ְ' + r3 + 'ָה';
        if (targetPersonId === '2mp') {
            // 2mp uses sheva on r1, not qamatz
            return getR1WithShevaDagesh() + r2 + 'ַ' + r3 + 'ְתֶּם';
        }
        if (targetPersonId === '3p') return getR1WithQamatzDagesh() + r2 + 'ְ' + r3 + 'וּ';
        // 1st & 2nd person with suffix - add sheva separator if needed
        const sep = needsShevaSeparator(suf) ? 'ְ' : '';
        return getR1WithQamatzDagesh() + r2 + 'ַ' + r3 + sep + suf;
    }

    // Pa'al special handling for initial-yod roots (e.g., ידע)
    function paalYodForm(tense, targetPersonId, r1, r2, r3, item, suf) {
        // Only special-case present and future; let fallback handle past (more reliable)
        if (tense === 'pres') {
            // prefix יוֹ + r2 + vowel + r3 + suffix
            if (targetPersonId === 'fs') return applyDagesh(r1) + "וֹ" + r2 + "ַ" + r3 + "ַ" + (suf || 'ת');
            let v = (['mp', 'fp'].includes(targetPersonId)) ? "ְ" : "ֵ";
            return applyDagesh(r1) + "וֹ" + r2 + v + r3 + (suf || '');
        }

        if (tense === 'fut') {
            // future: אֵדַע, תֵדַע, יֵדַע etc.
            let pre = '';
            if (targetPersonId === '1s') pre = 'אֵ';
            else if (['2ms', '2fs', '2mp', '2fp'].includes(targetPersonId)) pre = 'תֵּ';
            else if (['3ms', '3p'].includes(targetPersonId)) pre = 'יֵ';
            else if (targetPersonId === '1p') pre = 'נֵ';
            let midVowel = suf ? "ְ" : "ַ";
            return pre + r2 + midVowel + r3 + (suf || '');
        }

        return null;
    }

    function generateForm(rawShoresh, targetPersonId) {
        let cleanShoresh = rawShoresh.split('').map(unSofit).join('');
        
        let r1 = cleanShoresh[0], r2 = cleanShoresh[1], r3 = cleanShoresh[2], r4 = cleanShoresh[3] || "";
        let isQuad = cleanShoresh.length === 4;
        let isYodRoot = r1 === 'י' && !isQuad;
        let isAlephRoot = r1 === 'א' && !isQuad;
        let isAlephMemRoot = isAlephRoot && r2 === 'מ';
        let isAlephMiddleRoot = !isQuad && r2 === 'א' && !isHeRoot(r3);
        let isFinalMemWeakRoot = !isQuad && r3 === 'מ';
        let res = "";

        // Check if the doubled middle root letter is guttural
        let middleDagesh = isGuttural(r2) ? "" : "ּ";

        let list = [];
        if (path.tense === 'pres') {
            list = [
                { id: 'ms', he: 'יחיד (זכר)', suf: '' }, { id: 'fs', he: 'יחידה (נקבה)', suf: 'ת' },
                { id: 'mp', he: 'רבים (זכר)', suf: 'ִים' }, { id: 'fp', he: 'רבות (נקבה)', suf: 'וֹת' }
            ];
        } else if (path.tense === 'imp') {
            list = [
                { id: '2ms', he: 'אתה', suf: '' }, { id: '2fs', he: 'את', suf: 'ִי' },
                { id: '2mp', he: 'אתם/אתן', suf: 'וּ' }
            ];
        } else if (['inf', 'ger'].includes(path.tense)) {
            list = [{ id: 'none', he: 'כללי', past: '', fut_pre: '', fut_suf: '', suf: '' }];
        } else {
            list = persons;
        }

        let item = list.find(p => p.id === targetPersonId) || { past: '', fut_pre: '', fut_suf: '', suf: '' };
        let suf = (path.tense === 'past') ? item.past : (path.tense === 'pres' ? item.suf : (item.fut_suf || item.suf || ""));

        // Compute effective future prefix, adjusting for initial-guttural roots (use אֲ instead of אֶ)
        let effectiveFutPre = item.fut_pre;
        if (effectiveFutPre && effectiveFutPre[0] === 'א' && isGuttural(r1)) {
            effectiveFutPre = 'אֲ';
        }
        // For initial-yod roots in Pi'el/Hitpa'el prefer the a-class prefix (אֲ) for 1s
        if (isYodRoot && effectiveFutPre && effectiveFutPre[0] === 'א' && (path.binyan === 'piel' || path.binyan === 'hitpael') && targetPersonId === '1s') {
            effectiveFutPre = 'אֲ';
        }
        // activeFutPre used by some branches (piel), default to effectiveFutPre

        // --- HUF'AL ---
        else if (path.binyan === 'hufal') {
            if (isAlephMiddleRoot) {
                if (path.tense === 'pres') {
                    if (targetPersonId === 'fs') {
                        res = "מוּ" + r1 + "ְ" + r2 + "ֶ" + r3 + "ֶ" + "ת";
                    } else if (targetPersonId === 'mp') {
                        res = "מוּ" + r1 + "ְ" + r2 + "ָ" + r3 + "ִים";
                    } else if (targetPersonId === 'fp') {
                        res = "מוּ" + r1 + "ְ" + r2 + "ָ" + r3 + "וֹת";
                    } else {
                        res = "מוּ" + r1 + "ְ" + r2 + "ָ" + r3;
                    }
                } else if (path.tense === 'past') {
                    if (targetPersonId === '3ms') {
                        res = "הוּ" + r1 + "ַ" + r2 + "ַ" + r3;
                    } else if (targetPersonId === '3fs') {
                        res = "הוּ" + r1 + "ְ" + r2 + "ֲ" + r3 + "ָה";
                    } else if (targetPersonId === '3p') {
                        res = "הוּ" + r1 + "ְ" + r2 + "ֲ" + r3 + "וּ";
                    } else {
                        res = "הוּ" + r1 + "ְ" + r2 + "ַ" + r3 + (suf || '');
                    }
                } else if (path.tense === 'fut') {
                    let prefix = '';
                    if (targetPersonId === '1s') prefix = 'אוּ';
                    else if (['2ms', '2fs', '2mp', '2fp', '3fs'].includes(targetPersonId)) prefix = 'תּוּ';
                    else if (['3ms', '3p'].includes(targetPersonId)) prefix = 'יוּ';
                    else if (targetPersonId === '1p') prefix = 'נוּ';
                    let stem = r1 + "ְ" + r2 + ((['2fs', '2mp', '2fp', '3p'].includes(targetPersonId)) ? "ֲ" + r3 : "ַ" + r3);
                    let extra = '';
                    if (targetPersonId === '2fs') extra = 'ִי';
                    else if (['2mp', '2fp', '3p'].includes(targetPersonId)) extra = 'וּ';
                    res = prefix + stem + extra;
                } else {
                    let pre = (path.tense === 'past') ? "הוּ" : (path.tense === 'pres' ? "מוּ" : (effectiveFutPre ? effectiveFutPre[0] + "וּ" : ''));
                    let v = (suf) ? "ְ" : ((path.tense === 'pres') ? "ָ" : "ַ");
                    res = pre + r1 + "ְ" + r2 + v + r3 + suf;
                }
            } else {
                let pre = (path.tense === 'past') ? "הוּ" : (path.tense === 'pres' ? "מוּ" : (effectiveFutPre ? effectiveFutPre[0] + "וּ" : ''));
                let v = (suf) ? "ְ" : ((path.tense === 'pres') ? "ָ" : "ַ");
                res = pre + r1 + "ְ" + r2 + v + r3 + suf;
            }
        }

        // --- HITPA'EL ---
        else if (path.binyan === 'hitpael') {
            let mid = isQuad ? r2 + "ְ" + r3 + (isGuttural(r3) ? "" : "ּ") : r2 + middleDagesh;
            let endR = isQuad ? r4 : r3;
            
            if (path.tense === 'ger') {
                res = "הִתְ" + applyDagesh(r1) + "ַ" + (isQuad ? r2 + "ְ" + r3 + (isGuttural(r3) ? "" : "ּ") : r2 + middleDagesh) + "וּ" + endR + "ת";
            } else {
                let pre = (path.tense === 'past') ? "הִתְ" : 
                          (path.tense === 'pres') ? "מִתְ" : 
                          (path.tense === 'inf') ? "לְהִתְ" : 
                          (path.tense === 'imp') ? "הִתְ" : 
                          ((isQuad ? (effectiveFutPre ? effectiveFutPre[0] + "ְ" : '') : (effectiveFutPre || '')) + "תְ");
                
                let v = (suf || ['mp', 'fp'].includes(targetPersonId)) ? "ְ" : "ֵ";
                res = pre + applyDagesh(r1) + "ַ" + mid + v + endR + suf;
            }
        }

        return applySofit(res);
    }

    function update() {
        const s = document.getElementById('shoresh').value;
        if ((s.length < 3) || !path.binyan || !path.tense) {
            document.getElementById('layer4').classList.add('hidden');
            return;
        }

        let currentGroupList = [];
        if (path.tense === 'pres') {
            currentGroupList = [
                { id: 'ms', he: 'יחיד (זכר)' }, { id: 'fs', he: 'יחידה (נקבה)' },
                { id: 'mp', he: 'רבים (זכר)' }, { id: 'fp', he: 'רבות (נקבה)' }
            ];
        } else if (path.tense === 'imp') {
            currentGroupList = [
                { id: '2ms', he: 'אתה' }, { id: '2fs', he: 'את' }, { id: '2mp', he: 'אתם/אתן' }
            ];
        } else if (['inf', 'ger'].includes(path.tense)) {
            currentGroupList = [{ id: 'none', he: 'צורת מקור/שם' }];
        } else {
            currentGroupList = persons;
        }

        const resultsDisplay = document.getElementById('results-display');
        resultsDisplay.innerHTML = '';

        currentGroupList.forEach(item => {
            const finalVerbForm = generateForm(s, item.id);
            
            const card = document.createElement('div');
            card.className = 'result-card';
            
            card.innerHTML = `
                <div class="result-pronoun">${item.he}</div>
                <div class="result-verb">${finalVerbForm || 'שגיאה'}</div>
            `;
            resultsDisplay.appendChild(card);
        });

        const b = binyanData[path.group].find(x => x.id === path.binyan);
        document.getElementById('path-en').innerText = `${path.group.toUpperCase()} > ${b.en} > ${path.tense.toUpperCase()}`;
        document.getElementById('path-he').innerText = `${b.he} > ${path.tense}`;
        
        show('layer4');
    }
</script>
</body>
