<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew Verb Logic Engine - Advanced</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { font-size: 2.2em; padding: 10px; width: 250px; text-align: center; border: 3px solid #007bff; border-radius: 12px; margin-bottom: 20px; outline: none; }
        .node-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .card { background: #fff; border: 1px solid #dee2e6; padding: 12px 18px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 600; min-width: 140px; display: flex; flex-direction: column; }
        .card span { font-size: 0.8em; color: #666; font-weight: normal; }
        .card:hover { border-color: #007bff; background: #f0f7ff; }
        .selected { background: #007bff !important; color: white !important; border-color: #0056b3; }
        .selected span { color: #e0e0e0; }
        #result-box { margin-top: 30px; padding: 40px; background: #ffffff; border-radius: 20px; border: 4px solid #007bff; }
        .hebrew-word { font-size: 5.5em; color: #1a1a1a; margin: 10px 0; font-weight: bold; line-height: 1.1; }
        .hidden { display: none; }
        .step-label { color: #8e8e8e; font-size: 0.75em; text-transform: uppercase; font-weight: 800; width: 100%; margin-top: 20px; letter-spacing: 1.5px; }
        #path-display { display: flex; justify-content: center; gap: 20px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hebrew Logic Engine</h1>
    <input type="text" id="shoresh" placeholder="כנס / טלפן" maxlength="4" oninput="update()">

    <div id="layer1" class="node-container">
        <p class="step-label">1. Group / קבוצה</p>
        <div class="card" onclick="selectGroup('simple')">Simple<span>פעל/נפעל</span></div>
        <div class="card" onclick="selectGroup('intensive')">Intensive<span>פיעל/פועל</span></div>
        <div class="card" onclick="selectGroup('causative')">Causative<span>הפעיל/הופעל</span></div>
        <div class="card" onclick="selectGroup('reflexive')">Reflexive<span>התפעל</span></div>
    </div>

    <div id="layer2" class="node-container hidden">
        <p class="step-label">2. Binyan / בניין</p>
        <div id="binyan-options" class="node-container"></div>
    </div>

    <div id="layer3" class="node-container hidden">
        <p class="step-label">3. Tense / זמן</p>
        <div class="card" onclick="select(3, 'past')">Past<span>עבר</span></div>
        <div class="card" onclick="select(3, 'pres')">Present<span>הווה</span></div>
        <div class="card" onclick="select(3, 'fut')">Future<span>עתיד</span></div>
        <div class="card" onclick="select(3, 'imp')">Imperative<span>ציווי</span></div>
        <div class="card" onclick="select(3, 'inf')">Infinitive<span>שם הפועל</span></div>
        <div class="card" onclick="select(3, 'ger')">Gerund<span>שם הפעולה</span></div>
    </div>

    <div id="layer4" class="node-container hidden"></div>

    <div id="result-box" class="hidden">
        <div class="hebrew-word" id="word-output">---</div>
        <div id="path-display">
            <div id="path-en" style="color: #007bff; font-weight: bold;"></div>
            <div id="path-he" style="color: #28a745; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    let path = { group: '', binyan: '', tense: '', person: '' };

    const binyanData = {
        simple: [{ id: 'paal', en: 'Pa\'al', he: 'פָּעַל' }, { id: 'nifal', en: 'Nif\'al', he: 'נִפְעַל' }],
        intensive: [{ id: 'piel', en: 'Pi\'el', he: 'פִּיעֵל' }, { id: 'pual', en: 'Pu\'al', he: 'פֻּעַל' }],
        causative: [{ id: 'hifil', en: 'Hif\'il', he: 'הִפְעִיל' }, { id: 'hufal', en: 'Huf\'al', he: 'הֻפְעַל' }],
        reflexive: [{ id: 'hitpael', en: 'Hitpa\'el', he: 'הִתְפַּעֵל' }]
    };

    const persons = [
        { id: '1s', en: 'I', he: 'אני', past: 'תִּי', fut_pre: 'אֶ' },
        { id: '2ms', en: 'You m.', he: 'אתה', past: 'תָּ', fut_pre: 'תִּ' },
        { id: '2fs', en: 'You f.', he: 'את', past: 'תְּ', fut_pre: 'תִּ', fut_suf: 'ִי' },
        { id: '3ms', en: 'He', he: 'הוא', past: '', fut_pre: 'יִ' },
        { id: '3fs', en: 'She', he: 'היא', past: 'ָה', fut_pre: 'תִּ' },
        { id: '1p', en: 'We', he: 'אנחנו', past: 'ְנוּ', fut_pre: 'נִ' },
        { id: '2mp', en: 'You all m.', he: 'אתם', past: 'ְתֶּם', fut_pre: 'תִּ', fut_suf: 'וּ' },
        { id: '2fp', en: 'You all f.', he: 'אתן', past: 'ְתֶּן', fut_pre: 'תִּ', fut_suf: 'נָה' },
        { id: '3p', en: 'They', he: 'הם/הן', past: 'וּ', fut_pre: 'יִ', fut_suf: 'וּ' }
    ];

    function selectGroup(g) {
        path.group = g;
        const container = document.getElementById('binyan-options');
        container.innerHTML = '';
        binyanData[g].forEach(b => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `${b.en}<span>${b.he}</span>`;
            div.onclick = (e) => { 
                path.binyan = b.id; 
                show('layer3'); 
                highlight(2, div); 
                update(); 
            };
            container.appendChild(div);
        });
        show('layer2'); highlight(1);
    }

    function select(layer, key) {
        if (layer === 3) { 
            path.tense = key; 
            if (['inf', 'ger'].includes(key)) {
                path.person = 'none';
                document.getElementById('layer4').classList.add('hidden');
                show('result-box');
            } else {
                setupPersonLayer(key); 
                show('layer4'); 
            }
            highlight(3); 
        }
        if (layer === 4) { path.person = key; show('result-box'); highlight(4); }
        update();
    }

    function setupPersonLayer(t) {
        const container = document.getElementById('layer4');
        container.innerHTML = '<p class="step-label">4. Person / גוף</p>';
        let list = [];
        if (t === 'pres') {
            list = [
                { id: 'ms', en: 'M. Sing.', he: 'יחיד', suf: '' }, { id: 'fs', en: 'F. Sing.', he: 'יחידה', suf: 'ֶת' },
                { id: 'mp', en: 'M. Plur.', he: 'רבים', suf: 'ִים' }, { id: 'fp', en: 'F. Plur.', he: 'רבות', suf: 'וֹת' }
            ];
        } else if (t === 'imp') {
            list = [
                { id: '2ms', en: 'You m.', he: 'אתה', suf: '' }, { id: '2fs', en: 'You f.', he: 'את', suf: 'ִי' },
                { id: '2mp', en: 'You all', he: 'אתם', suf: 'וּ' }
            ];
        } else {
            list = persons;
        }

        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `${item.en}<span>${item.he}</span>`;
            div.onclick = () => select(4, item.id);
            container.appendChild(div);
        });
    }

    function highlight(layer, target) {
        const el = target || event.currentTarget;
        document.querySelectorAll(`#layer${layer} .card`).forEach(c => c.classList.remove('selected'));
        if(el) el.classList.add('selected');
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }

    function applyDagesh(char) {
        return ['ב', 'כ', 'פ'].includes(char) ? char + "ּ" : char;
    }

    function applySofit(word) {
        const sofitMap = { 'כ': 'ך', 'מ': 'ם', 'נ': 'ן', 'פ': 'ף', 'צ': 'ץ' };
        let letters = word.split('');
        for (let i = letters.length - 1; i >= 0; i--) {
            if (letters[i] >= '\u05D0' && letters[i] <= '\u05EA') {
                if (sofitMap[letters[i]]) {
                    letters[i] = sofitMap[letters[i]];
                }
                break;
            }
        }
        return letters.join('');
    }

    function update() {
        const s = document.getElementById('shoresh').value;
        if ((s.length < 3) || !path.person) return;
        
        let r1 = s[0], r2 = s[1], r3 = s[2], r4 = s[3] || "";
        let isQuad = s.length === 4;
        let res = "";

        let list = (path.tense === 'pres' ? [
            { id: 'ms', suf: '' }, { id: 'fs', suf: 'ֶת' },
            { id: 'mp', suf: 'ִים' }, { id: 'fp', suf: 'וֹת' }
        ] : persons);
        
        if (path.tense === 'imp') {
            list = [{ id: '2ms', suf: '' }, { id: '2fs', suf: 'ִי' }, { id: '2mp', suf: 'וּ' }];
        }
        
        let item = list.find(p => p.id === path.person) || { past: '', fut_pre: '', fut_suf: '', suf: '' };
        let suf = (path.tense === 'past') ? item.past : (path.tense === 'pres' ? item.suf : (item.fut_suf || item.suf || ""));

        // --- PA'AL ---
        if (path.binyan === 'paal') {
            if (path.tense === 'past') {
                let v1 = (['1s', '2ms', '2fs', '1p', '2mp', '2fp'].includes(path.person)) ? "ַ" : "ָ";
                let v2 = (['3fs', '3p'].includes(path.person)) ? "ְ" : "ַ";
                res = applyDagesh(r1) + v1 + r2 + v2 + r3 + suf;
            } else if (path.tense === 'pres') {
                res = applyDagesh(r1) + "וֹ" + r2 + (['mp', 'fp'].includes(path.person) ? "ְ" : "ֵ") + r3 + suf;
            } else if (path.tense === 'fut' || path.tense === 'imp') {
                let pre = (path.tense === 'imp') ? applyDagesh(r1) : item.fut_pre + r1;
                res = pre + "ְ" + r2 + "וֹ" + r3 + suf;
            } else if (path.tense === 'inf') res = "לִ" + r1 + "ְ" + r2 + "וֹ" + r3;
            else if (path.tense === 'ger') res = applyDagesh(r1) + "ְ" + r2 + "ִי" + r3 + "ָה";
        } 

        // --- NIF'AL ---
        else if (path.binyan === 'nifal') {
            if (path.tense === 'past') {
                let v2 = (['3fs', '3p'].includes(path.person)) ? "ְ" : "ַ";
                res = "נִ" + "י" + r1 + "ְ" + r2 + v2 + r3 + suf;
            } else if (path.tense === 'pres') {
                res = "נִ" + "י" + r1 + "ְ" + r2 + "ָ" + r3 + suf;
            } else if (path.tense === 'fut' || path.tense === 'imp' || path.tense === 'inf') {
                let pre = (path.tense === 'inf') ? "לְהִ" + "י" : (path.tense === 'imp') ? "הִ" + "י" : item.fut_pre + "י";
                let v = (suf) ? "ָ" : "ֵ";
                res = pre + r1 + "ָּ" + r2 + v + r3 + suf;
            } else if (path.tense === 'ger') res = "הִ" + r1 + "ָ" + r2 + "ְ" + r3 + "וּת";
        }

        // --- PI'EL / PI'EL QUAD ---
        else if (path.binyan === 'piel') {
            let mid = isQuad ? r2 + "ְ" + r3 : r2 + "ּ";
            let endR = isQuad ? r4 : r3;

            if (path.tense === 'past') {
                // Bugfix 1 & 2: Differentiate 3-letter vs 4-letter prefixes, and completely stop double Shvas
                let prefixVowel = isQuad ? "ַ" : "ִ"; 
                let basePre = applyDagesh(r1) + prefixVowel + (isQuad ? "" : "י") + mid;
                
                let v = "";
                if (suf.startsWith("ְ")) {
                    v = ""; // Suffix handles the Shva structure itself (e.g., ְנוּ)
                } else if (suf) {
                    v = "ְ"; // Suffix needs a structural Shva
                } else {
                    v = (path.person === '3ms' ? "ֵ" : "ַ"); // Fallbacks for un-suffixed forms
                }
                res = basePre + v + endR + suf;
            } else if (path.tense === 'pres') {
                let v = (['mp', 'fp'].includes(path.person)) ? "ְ" : "ֵ";
                res = "מְ" + r1 + "ַ" + mid + v + endR + suf;
            } else if (path.tense === 'fut' || path.tense === 'imp' || path.tense === 'inf') {
                let v = (suf) ? "ְ" : "ֵ";
                if (path.tense === 'imp') {
                    res = applyDagesh(r1) + "ַ" + mid + v + endR + suf;
                } else {
                    let pre = (path.tense === 'inf') ? "לְ" : (isQuad ? item.fut_pre[0] + "ְ" : item.fut_pre);
                    res = pre + r1 + "ַ" + mid + v + endR + suf;
                }
            } else if (path.tense === 'ger') {
                res = isQuad ? applyDagesh(r1) + "ִי" + r2 + "ְ" + r3 + "וּ" + r4 : applyDagesh(r1) + "ִי" + r2 + "ּ" + "וּ" + r3;
            }
        }

        // --- HIF'IL ---
        else if (path.binyan === 'hifil') {
            if (path.tense === 'past') {
                let v = (suf) ? "ְ" : (['3ms', '3fs', '3p'].includes(path.person) ? "ִי" : "ַ");
                res = "הִ" + r1 + "ְ" + r2 + v + r3 + suf;
            } else if (path.tense === 'pres') {
                res = "מַ" + r1 + "ְ" + r2 + "ִי" + r3 + suf;
            } else if (path.tense === 'fut' || path.tense === 'imp' || path.tense === 'inf') {
                let pre = (path.tense === 'inf') ? "לְהַ" : (path.tense === 'imp' ? "הַ" : item.fut_pre[0] + "ַ");
                let v = (path.tense === 'imp' && !suf) ? "ֵ" : "ִי";
                res = pre + r1 + "ְ" + r2 + v + r3 + suf;
            } else if (path.tense === 'ger') res = "הַ" + r1 + "ְ" + r2 + "ָ" + r3 + "ָה";
        }

        // --- PU'AL ---
        else if (path.binyan === 'pual') {
            let mid = isQuad ? r2 + "ְ" + r3 : r2 + "ּ";
            let endR = isQuad ? r4 : r3;
            let pre = (path.tense === 'pres') ? "מְ" + r1 : (path.tense === 'past' ? applyDagesh(r1) : (isQuad ? item.fut_pre[0] + "ְ" : item.fut_pre) + r1);
            let v = (suf) ? "ְ" : ((path.tense === 'pres') ? "ָ" : "ַ");
            res = pre + "וּ" + mid + v + endR + suf;
        }

        // --- HUF'AL ---
        else if (path.binyan === 'hufal') {
            let pre = (path.tense === 'past') ? "הוּ" : (path.tense === 'pres' ? "מוּ" : item.fut_pre[0] + "וּ");
            let v = (suf) ? "ְ" : ((path.tense === 'pres') ? "ָ" : "ַ");
            res = pre + r1 + "ְ" + r2 + v + r3 + suf;
        }

        // --- HITPA'EL ---
        else if (path.binyan === 'hitpael') {
            let mid = isQuad ? r2 + "ְ" + r3 : r2 + "ּ";
            let endR = isQuad ? r4 : r3;
            
            if (path.tense === 'ger') {
                res = "הִתְ" + applyDagesh(r1) + "ַ" + (isQuad ? r2 + "ְ" + r3 : r2 + "ּ") + "וּ" + endR + "ת";
            } else {
                let pre = (path.tense === 'past') ? "הִתְ" : 
                          (path.tense === 'pres') ? "מִתְ" : 
                          (path.tense === 'inf') ? "לְהִתְ" : 
                          (path.tense === 'imp') ? "הִתְ" : 
                          ((isQuad ? item.fut_pre[0] + "ְ" : item.fut_pre) + "תְ");
                
                let v = (suf || ['mp', 'fp'].includes(path.person)) ? "ְ" : "ֵ";
                res = pre + applyDagesh(r1) + "ַ" + mid + v + endR + suf;
            }
        }

        document.getElementById('word-output').innerText = applySofit(res) || "Logic Error";
        
        const b = binyanData[path.group].find(x => x.id === path.binyan);
        document.getElementById('path-en').innerText = `${path.group.toUpperCase()} > ${b.en} > ${path.tense.toUpperCase()}`;
        document.getElementById('path-he').innerText = `${b.he} > ${path.tense}`;
    }
</script>
</body>
</html>
